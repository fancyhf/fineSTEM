      - "评估"
      - "展示"
      - "演示"
      - "总结"
      - "复盘"

# 研学文档轨触发语
research_docs_triggers:
  generate_proposal:
    skill_id: "01_brainstorm_studio"
    description: "生成/更新开题报告"
    triggers:
      - "生成研学报告"
      - "我要写开题"
      - "写开题报告"
      - "开题"
    target_doc: "10_proposal.md"
  
  generate_prd:
    skill_id: "03_scope_cutter"
    description: "生成/更新需求与设计文档"
    triggers:
      - "写需求文档"
      - "设计文档"
      - "写PRD"
      - "需求分析"
    target_doc: "20_prd_design.md"
  
  generate_prototype_spec:
    skill_id: "05_designer"
    description: "生成/更新原型设计说明书"
    triggers:
      - "原型设计"
      - "画界面"
      - "写原型文档"
      - "界面设计"
    target_doc: "30_prototype_spec.md"
  
  generate_tech_report:
    skill_id: "07_coder_coach"
    description: "追加技术报告日志"
    triggers:
      - "写技术报告"
      - "记录日志"
      - "开发日志"
      - "实验记录"
    target_doc: "40_tech_report.md"
  
  generate_final_report:
    skill_id: "08_evaluator_showcase"
    description: "生成结题报告"
    triggers:
      - "写结题报告"
      - "项目总结"
      - "结题"
      - "总结报告"
    target_doc: "50_final_report.md"
  
  generate_paper:
    skill_id: "08_evaluator_showcase"
    description: "生成论文（需 paper_mode != off）"
    triggers:
      - "写论文"
      - "生成论文"
      - "学术论文"
      - "我要发论文"
    target_doc: "60_paper.md"
    requires:
      paper_mode: ["basic", "advanced"]
  
  enable_paper_mode:
    skill_id: "00_project_bootstrap"
    description: "启用论文模式"
    triggers:
      - "要论文"
      - "需要论文"
      - "开启论文模式"
      - "写学术论文"
    action: "set_paper_mode"
    paper_mode: "basic"
