version: v2
ui_language: zh-CN
language: zh-CN

# 语言约束：所有 Skill 输出必须使用中文，包括思考过程、对话、文档生成

# Workspace 多项目模式配置
workspace:
  projects_root: "projects"
  state_file: "SKILL_STATE.json"

# 研学文档轨模式配置
research_docs_track:
  enabled_by_default: true
  paper_mode_default: "off"
  templates_dir: "artifacts/templates/research"
  output_dir: "docs/research"
  assets_dir: "docs/research/assets"

# 入口路由配置
entry_routes:
  project_bootstrap:
    skill_id: "00_project_bootstrap"
    description: "创建新项目，初始化工作区目录结构"
    triggers:
      - "创建新项目"
      - "开始新项目"
      - "新建项目"
      - "创建项目"
      - "我要做一个新项目"
      - "帮我开个新项目"
      - "初始化项目"

triggers:
  global_entry:
    - "开始一个项目"
    - "给我选题"
    - "我不知道做什么"
    - "来点点子"
    - "脑爆"
    - "我想做个东西"
    - "帮我找个题目"
    - "有什么好做的项目"
    - "我想学AI"
    - "从哪开始"
    - "创建新项目"
    - "开始新项目"
    - "新建项目"
    - "创建项目"
  
  skills:
    00_project_bootstrap:
      - "创建新项目"
      - "开始新项目"
      - "新建项目"
      - "创建项目"
      - "我要做一个新项目"
      - "帮我开个新项目"
      - "初始化项目"
    
    01_brainstorm_studio:
      - "选题"
      - "brainstorm"
      - "有什么方向"
      - "推荐项目"
      - "我想做科学家"
      - "我想做创造者"
      - "AI方向"
      - "给我灵感"
      - "开始脑爆"
      - "继续脑爆"
    
    02_idea_to_spec:
      - "写需求"
      - "开题"
      - "立项"
      - "把想法写成文档"
      - "确定目标"
      - "定义成功标准"
      - "这个项目怎么做"
      - "具体方案"
    
    03_scope_cutter:
      - "裁剪范围"
      - "做不完"
      - "太多了"
      - "MVP"
      - "砍掉功能"
      - "简化"
      - "哪些必须做"
      - "哪些可以不做"
    
    04_track_router:
      - "选方向"
      - "网页还是硬件"
      - "Kaggle"
      - "做网站"
      - "做硬件"
      - "数据建模"
      - "课程设计"
      - "用什么技术"
    
    05_designer:
      - "设计"
      - "架构"
      - "页面设计"
      - "组件设计"
      - "实验方案"
      - "接线图"
      - "引脚规划"
      - "教案设计"
    
    06_task_decomposer:
