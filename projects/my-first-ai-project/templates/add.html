{% extends "base.html" %}

{% block title %}添加诗词 - 文学天团{% endblock %}

{% block content %}
<div class="container">
    <div class="form-container">
        <h2 class="form-title">✏️ 添加新的诗词卡片</h2>
        <form method="POST" action="{{ url_for('add_poetry') }}" class="add-form">
            <div class="form-group">
                <label for="title">📖 诗词题目 *</label>
                <input type="text" 
                       id="title" 
                       name="title" 
                       class="form-input" 
                       required 
                       placeholder="例如：静夜思">
            </div>

            <div class="form-group">
                <label for="author">✍️ 作者 *</label>
                <input type="text" 
                       id="author" 
                       name="author" 
                       class="form-input" 
                       required 
                       placeholder="例如：李白">
            </div>

            <div class="form-group">
                <label for="dynasty">🏛️ 朝代 *</label>
                <input type="text" 
                       id="dynasty" 
                       name="dynasty" 
                       class="form-input" 
                       required 
                       placeholder="例如：唐">
            </div>

            <div class="form-group">
                <label for="category">📂 分类 *</label>
                <select id="category" name="category" class="form-select" required>
                    {% for category in categories %}
                    <option value="{{ category }}">{{ category }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="content">💬 诗词内容 *</label>
                <textarea id="content" 
                          name="content" 
                          class="form-textarea" 
                          required 
                          rows="6"
                          placeholder="输入诗词内容..."></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="submit-button">💾 保存诗词</button>
                <a href="{{ url_for('index') }}" class="cancel-button">取消</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
