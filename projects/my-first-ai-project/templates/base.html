<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}文学知识卡 - 二次元漫画版{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">📚 文学天团</h1>
            <nav class="nav">
                <a href="{{ url_for('index') }}" class="nav-link {% if not is_favorites_view %}active{% endif %}">首页</a>
                <a href="{{ url_for('add_poetry') }}" class="nav-link">添加诗词</a>
                <a href="{{ url_for('import_poetry') }}" class="nav-link">导入内容</a>
                <a href="{{ url_for('favorites') }}" class="nav-link {% if is_favorites_view %}active{% endif %}">⭐ 我的收藏</a>
                <a href="{{ url_for('stats') }}" class="nav-link">📊 数据统计</a>
            </nav>
        </div>
    </header>

    <main class="main">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>💕 文学天团 - 二次元漫画版 💕</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
