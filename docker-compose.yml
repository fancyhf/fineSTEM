version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: ./apps/public-web/src/features/mvp/phase1/backend
      dockerfile: Dockerfile
      args:
        - DEBIAN_FRONTEND=noninteractive
    container_name: ${COMPOSE_PROJECT_NAME:-finestem}-backend
    restart: always
    ports:
      - "${BACKEND_HOST_PORT:-18080}:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=8000
    networks:
      - ${COMPOSE_PROJECT_NAME:-finestem}-network
    volumes:
      - ${COMPOSE_PROJECT_NAME:-finestem}-data:/app/data
      - ${COMPOSE_PROJECT_NAME:-finestem}-logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # 前端服务
  frontend:
    build:
      context: ./apps/public-web/src/features/mvp/phase1/web
      dockerfile: Dockerfile
      args:
        BASE_PATH: ${BASE_PATH:-/}
    container_name: ${COMPOSE_PROJECT_NAME:-finestem}-frontend
    restart: always
    ports:
      - "${FRONTEND_HOST_PORT:-8080}:80"
    depends_on:
      - backend
    networks:
      - ${COMPOSE_PROJECT_NAME:-finestem}-network
    volumes:
      - ${COMPOSE_PROJECT_NAME:-finestem}-logs:/var/log/nginx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

# 网络配置
networks:
  ${COMPOSE_PROJECT_NAME:-finestem}-network:
    driver: bridge
    name: ${COMPOSE_PROJECT_NAME:-finestem}-network

# 卷配置（项目独立数据卷）
volumes:
  ${COMPOSE_PROJECT_NAME:-finestem}-data:
    driver: local
  ${COMPOSE_PROJECT_NAME:-finestem}-logs:
    driver: local
