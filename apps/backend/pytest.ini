[pytest]
# 2026-07-22 测试体系重构：补全 asyncio 配置、markers、testpaths
# 修复 11+ 个 async 测试因缺 asyncio_mode=auto 而误判失败的问题
asyncio_mode = auto

testpaths = tests

# 自定义 markers（消除 PytestUnknownMarkWarning）
markers =
    asyncio: async test (pytest-asyncio)
    timeout: mark test with a timeout in seconds
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks integration tests requiring external services (ZeroClaw/DB)
    e2e: marks end-to-end tests

# 超时（如装了 pytest-timeout 则生效；未装时忽略）
# timeout = 60
# timeout_method = thread

filterwarnings =
    ignore:Please use `import python_multipart` instead\.:PendingDeprecationWarning:starlette\.formparsers
    ignore:The 'app' shortcut is now deprecated\. Use the explicit style\,transport=WSGITransport\(app=\.\.\.\) instead\.:DeprecationWarning:httpx\._client
    ignore:Unclosed <MemoryObjectSendStream.*:ResourceWarning:anyio\.streams\.memory
    ignore:Unclosed <MemoryObjectReceiveStream.*:ResourceWarning:anyio\.streams\.memory
    # async 测试没加 marker 的警告（asyncio_mode=auto 后不再需要逐个加）
    ignore:coroutine.* was never awaited:RuntimeWarning
